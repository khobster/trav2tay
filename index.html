<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta property="og:image" content="trav2tayopengraph.png">
    <title>Reunite the Lovebirds!</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-EHZNMPYG6N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-EHZNMPYG6N');
    </script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <img id="welcomeScreen" src="trav2taymenu2.gif" alt="Tap to start">
        <button id="themeToggle" type="button" aria-label="Toggle light mode">🌙</button>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="gameOverText">Game Over! Your score is: <span id="finalScore"></span></p>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
